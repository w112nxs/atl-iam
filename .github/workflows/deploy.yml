name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  security-events: read

jobs:
  security-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: read
    steps:
      - uses: actions/checkout@v5

      - name: Check CodeQL alerts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN=$(gh api repos/${{ github.repository }}/code-scanning/alerts?state=open --jq 'length' 2>/dev/null || echo "0")
          if [ "$OPEN" != "0" ]; then
            echo "::error::$OPEN open CodeQL alert(s) found. Fix before deploying."
            gh api repos/${{ github.repository }}/code-scanning/alerts?state=open \
              --jq '.[] | "  [\(.rule.severity)] \(.rule.id) — \(.most_recent_instance.location.path):\(.most_recent_instance.location.start_line)"'
            exit 1
          fi
          echo "✓ No open CodeQL alerts"

      - name: Check Dependabot alerts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESPONSE=$(gh api repos/${{ github.repository }}/dependabot/alerts?state=open 2>&1) || {
            echo "ℹ Dependabot alerts not accessible — enable Dependabot in repo settings to use this check."
            exit 0
          }
          OPEN=$(echo "$RESPONSE" | jq 'length')
          if [ "$OPEN" != "0" ] && [ "$OPEN" != "null" ]; then
            echo "::error::$OPEN open Dependabot alert(s) found. Fix before deploying."
            echo "$RESPONSE" | jq -r '.[] | "  [\(.security_advisory.severity)] \(.dependency.package.name) — \(.security_advisory.summary)"'
            exit 1
          fi
          echo "✓ No open Dependabot alerts"

  deploy-worker:
    runs-on: ubuntu-latest
    needs: security-check
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install
        working-directory: worker
        run: npm ci

      - name: Run D1 migrations
        working-directory: worker
        run: |
          # Create migrations tracking table and seed already-applied migrations
          npx wrangler d1 execute atlanta-iam-db --remote --command="CREATE TABLE IF NOT EXISTS _migrations (name TEXT PRIMARY KEY, applied_at TEXT DEFAULT (datetime('now')))"
          npx wrangler d1 execute atlanta-iam-db --remote --command="INSERT OR IGNORE INTO _migrations (name) VALUES ('migration-010-invites.sql'),('migration-011-speaking-fields.sql')"

          # Run each migration only if not already applied
          for migration in src/db/migration-0*.sql; do
            name=$(basename "$migration")
            applied=$(npx wrangler d1 execute atlanta-iam-db --remote --command="SELECT name FROM _migrations WHERE name = '$name'" --json 2>/dev/null | node -e "
              const d = JSON.parse(require('fs').readFileSync(0,'utf8'));
              console.log(d[0]?.results?.length > 0 ? 'yes' : 'no');
            " 2>/dev/null || echo "no")
            if [ "$applied" = "yes" ]; then
              echo "⏭ $name (already applied)"
            else
              echo "▶ Running $name..."
              npx wrangler d1 execute atlanta-iam-db --remote --file="$migration"
              npx wrangler d1 execute atlanta-iam-db --remote --command="INSERT OR IGNORE INTO _migrations (name) VALUES ('$name')"
              echo "✓ $name applied"
            fi
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set LinkedIn secrets
        working-directory: worker
        run: |
          echo '{"LINKEDIN_CLIENT_ID":"'"$LINKEDIN_CLIENT_ID"'","LINKEDIN_CLIENT_SECRET":"'"$LINKEDIN_CLIENT_SECRET"'"}' | npx wrangler secret bulk
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3.14
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-worker
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: |
          npm ci
          npm run build

      - name: Deploy Pages
        uses: cloudflare/wrangler-action@v3.14
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=atlanta-iam
