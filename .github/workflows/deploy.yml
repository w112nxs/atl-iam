name: Deploy

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  security-events: read

jobs:
  security-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: read
    steps:
      - uses: actions/checkout@v5

      - name: Check CodeQL alerts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN=$(gh api repos/${{ github.repository }}/code-scanning/alerts?state=open --jq 'length' 2>/dev/null || echo "0")
          if [ "$OPEN" != "0" ]; then
            echo "::error::$OPEN open CodeQL alert(s) found. Fix before deploying."
            gh api repos/${{ github.repository }}/code-scanning/alerts?state=open \
              --jq '.[] | "  [\(.rule.severity)] \(.rule.id) — \(.most_recent_instance.location.path):\(.most_recent_instance.location.start_line)"'
            exit 1
          fi
          echo "✓ No open CodeQL alerts"

      - name: Check Dependabot alerts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESPONSE=$(gh api repos/${{ github.repository }}/dependabot/alerts?state=open 2>&1) || {
            echo "ℹ Dependabot alerts not accessible — enable Dependabot in repo settings to use this check."
            exit 0
          }
          OPEN=$(echo "$RESPONSE" | jq 'length')
          if [ "$OPEN" != "0" ] && [ "$OPEN" != "null" ]; then
            echo "::error::$OPEN open Dependabot alert(s) found. Fix before deploying."
            echo "$RESPONSE" | jq -r '.[] | "  [\(.security_advisory.severity)] \(.dependency.package.name) — \(.security_advisory.summary)"'
            exit 1
          fi
          echo "✓ No open Dependabot alerts"

  deploy-worker:
    runs-on: ubuntu-latest
    needs: security-check
    permissions:
      contents: read
    env:
      WRANGLER_ENV: ${{ github.ref_name == 'dev' && 'dev' || '' }}
      D1_DB_NAME: ${{ github.ref_name == 'dev' && 'atlanta-iam-db-dev' || 'atlanta-iam-db' }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install
        working-directory: worker
        run: npm ci

      - name: Run D1 migrations
        working-directory: worker
        run: |
          # Create migrations tracking table and seed all previously-applied migrations
          npx wrangler d1 execute $D1_DB_NAME --remote --command="CREATE TABLE IF NOT EXISTS _migrations (name TEXT PRIMARY KEY, applied_at TEXT DEFAULT (datetime('now')))"
          npx wrangler d1 execute $D1_DB_NAME --remote --command="INSERT OR IGNORE INTO _migrations (name) VALUES ('migration-001-auth.sql'),('migration-002-onboarding.sql'),('migration-003-privacy.sql'),('migration-004-sessions.sql'),('migration-005-profile-updated.sql'),('migration-006-rate-limits.sql'),('migration-007-normalize-emails.sql'),('migration-008-privacy-defaults.sql'),('migration-009-event-types-checkin.sql'),('migration-010-invites.sql'),('migration-011-speaking-fields.sql')"

          # Run each migration only if not already tracked
          for migration in src/db/migration-*.sql; do
            name=$(basename "$migration")
            result=$(npx wrangler d1 execute $D1_DB_NAME --remote --command="SELECT name FROM _migrations WHERE name = '$name'" --json 2>/dev/null || echo "[]")
            if echo "$result" | node -e "const d=JSON.parse(require('fs').readFileSync(0,'utf8')); process.exit(d[0]?.results?.length > 0 ? 0 : 1)" 2>/dev/null; then
              echo "⏭ $name (already applied)"
            else
              echo "▶ Running $name..."
              npx wrangler d1 execute $D1_DB_NAME --remote --file="$migration"
              npx wrangler d1 execute $D1_DB_NAME --remote --command="INSERT OR IGNORE INTO _migrations (name) VALUES ('$name')"
              echo "✓ $name applied"
            fi
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set LinkedIn secrets
        working-directory: worker
        run: |
          ENV_FLAG="${WRANGLER_ENV:+--env $WRANGLER_ENV}"
          echo '{"LINKEDIN_CLIENT_ID":"'"$LINKEDIN_CLIENT_ID"'","LINKEDIN_CLIENT_SECRET":"'"$LINKEDIN_CLIENT_SECRET"'"}' | npx wrangler secret bulk $ENV_FLAG
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3.14
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy ${{ env.WRANGLER_ENV && format('--env {0}', env.WRANGLER_ENV) || '' }}

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-worker
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ github.ref_name == 'dev' && 'https://dev.atlantaiam.com/api' || vars.VITE_API_URL }}
        run: |
          npm ci
          npm run build

      - name: Deploy Pages
        uses: cloudflare/wrangler-action@v3.14
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=atlanta-iam --branch=${{ github.ref_name }}
