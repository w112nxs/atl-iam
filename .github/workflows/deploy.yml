name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: read

jobs:
  security-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: read
    steps:
      - uses: actions/checkout@v4

      - name: Check CodeQL alerts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN=$(gh api repos/${{ github.repository }}/code-scanning/alerts?state=open --jq 'length' 2>/dev/null || echo "0")
          if [ "$OPEN" != "0" ]; then
            echo "::error::$OPEN open CodeQL alert(s) found. Fix before deploying."
            gh api repos/${{ github.repository }}/code-scanning/alerts?state=open \
              --jq '.[] | "  [\(.rule.severity)] \(.rule.id) — \(.most_recent_instance.location.path):\(.most_recent_instance.location.start_line)"'
            exit 1
          fi
          echo "✓ No open CodeQL alerts"

      - name: Check Dependabot alerts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESPONSE=$(gh api repos/${{ github.repository }}/dependabot/alerts?state=open 2>&1) || {
            if echo "$RESPONSE" | grep -q "Resource not accessible"; then
              echo "::warning::Cannot access Dependabot alerts (requires vulnerability-alerts permission). Skipping."
              exit 0
            fi
            echo "::warning::Could not fetch Dependabot alerts. Skipping."
            exit 0
          }
          OPEN=$(echo "$RESPONSE" | jq 'length')
          if [ "$OPEN" != "0" ] && [ "$OPEN" != "null" ]; then
            echo "::error::$OPEN open Dependabot alert(s) found. Fix before deploying."
            echo "$RESPONSE" | jq -r '.[] | "  [\(.security_advisory.severity)] \(.dependency.package.name) — \(.security_advisory.summary)"'
            exit 1
          fi
          echo "✓ No open Dependabot alerts"

  deploy-worker:
    runs-on: ubuntu-latest
    needs: security-check
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install
        working-directory: worker
        run: npm ci

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-worker
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: |
          npm ci
          npm run build

      - name: Deploy Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=atlanta-iam
