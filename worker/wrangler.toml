name = "atlanta-iam-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Route under custom domain
routes = [
  { pattern = "atlantaiam.com/api/*", zone_name = "atlantaiam.com" }
]

# D1 binding — fill database_id after running: wrangler d1 create atlanta-iam-db
[[d1_databases]]
binding = "DB"
database_name = "atlanta-iam-db"
database_id = "ca35d4e7-e076-4a73-bb84-7a99ff981f9c"

[vars]
FRONTEND_URL = "https://atlantaiam.com"
